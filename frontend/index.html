<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/educlear-main-icon-v2-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/educlear-main-icon-v2-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f0f" />
    <title>EduClear</title>
    <style>
      /* Critical paint: dark shell + sidebar before React/CSS bundles load (no pale flash) */
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #0f0f0f;
        color: #f5deb3;
      }
      .school-shell {
        display: flex;
        width: 100%;
        min-height: 100vh;
        background: #0f0f0f;
      }
      .sidebar {
        width: 280px;
        min-width: 280px;
        flex-shrink: 0;
        background: linear-gradient(180deg, #0f0f0f 0%, #1a1a1a 100%);
        border-right: 1px solid rgba(212, 175, 55, 0.18);
        color: #f5deb3;
      }
      .main-content {
        background: #f7f4ef;
        color: #1d2736;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
