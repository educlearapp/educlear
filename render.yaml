# Render Blueprint — EduClear backend must run from backend/ so process.cwd()
# resolves data/ and uploads/ next to dist/.
services:
  - type: web
    name: educlear-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
  - type: web
    name: educlear-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_FEE_CHECK_BUILD_ID
        value: 32715bd-rollback
      - key: VITE_API_URL
        value: https://educlear-backend.onrender.com
